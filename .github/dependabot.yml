version: 2
updates:
  # npm dependencies (root package.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Batch low-risk dev-tooling bumps into one PR to cut noise.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      pact:
        patterns:
          - "@pact-foundation/*"

  # GitHub Actions used in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"
